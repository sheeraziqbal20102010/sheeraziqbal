<!DOCTYPE html>
<html lang="en" class="scroll-smooth scroll-pt-32">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Muhammad Sheeraz | Senior Computer Science Educator</title>
    <meta name="description" content="Computer Science Teacher Portfolio – 11+ Years Experience Empowering Students Through Code." />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            colors: {
              tech: {
                bg: 'rgb(var(--color-bg) / <alpha-value>)',
                surface: 'rgb(var(--color-surface) / <alpha-value>)',
                accent: 'rgb(var(--color-accent) / <alpha-value>)',
                secondary: 'rgb(var(--color-secondary) / <alpha-value>)',
                text: 'rgb(var(--color-text) / <alpha-value>)',
                muted: 'rgb(var(--color-muted) / <alpha-value>)',
              }
            },
            animation: {
              'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            }
          },
        },
      }
    </script>
    <style>
      :root {
        /* Default: Deep Navy / Emerald / Blue */
        --color-bg: 15 23 42; /* #0f172a */
        --color-surface: 30 41 59; /* #1e293b */
        --color-accent: 16 185 129; /* #10b981 */
        --color-secondary: 59 130 246; /* #3b82f6 */
        --color-text: 248 250 252; /* #f8fafc */
        --color-muted: 148 163 184; /* #94a3b8 */
      }
      
      .theme-cyber {
        /* Cyber Core: Charcoal / Teal / Purple */
        --color-bg: 18 18 18; /* #121212 */
        --color-surface: 30 30 30; /* #1e1e1e */
        --color-accent: 0 221 179; /* #00DDB3 */
        --color-secondary: 139 92 246; /* #8B5CF6 */
        --color-text: 226 232 240; /* #e2e8f0 */
        --color-muted: 161 161 170; /* #a1a1aa */
      }

      /* Custom scrollbar for that coding feel */
      ::-webkit-scrollbar {
        width: 10px;
      }
      ::-webkit-scrollbar-track {
        background: rgb(var(--color-bg));
      }
      ::-webkit-scrollbar-thumb {
        background: rgb(var(--color-surface));
        border-radius: 5px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgb(var(--color-muted));
      }
      .circuit-pattern {
        background-image: radial-gradient(rgb(var(--color-muted) / 0.2) 1px, transparent 1px);
        background-size: 30px 30px;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "framer-motion": "https://esm.sh/framer-motion@^12.23.26",
    "recharts": "https://esm.sh/recharts@^3.5.1",
    "lucide-react": "https://esm.sh/lucide-react@^0.561.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-tech-bg text-tech-text antialiased selection:bg-tech-accent selection:text-tech-bg transition-colors duration-300">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
